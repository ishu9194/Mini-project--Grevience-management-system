<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrievanceHub | Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #FF6B35 0%, #F7931E 100%);
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .brand-title {
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
            color: #FF6B35;
        }
        .btn-main {
            background: linear-gradient(135deg, #FF6B35 0%, #F7931E 100%);
            border: none;
            color: white;
            font-weight: 600;
        }
        .btn-main:hover {
            opacity: 0.9;
        }
        .btn-google {
            background: white;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h3 class="brand-title">Create Account</h3>

    <form id="signupForm">
        <div class="mb-3">
            <label>Full Name</label>
            <input id="fullName" type="text" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input id="email" type="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input id="password" type="password" class="form-control" placeholder="Min 6 characters" required>
        </div>

        <button type="submit" class="btn btn-main w-100 mb-2">
            Register
        </button>

        <button type="button" id="googleSignup" class="btn btn-google w-100 mb-3">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G" style="width: 18px; margin-right: 8px;">
            Sign up with Google
        </button>

        <div class="text-center mt-3">
            Already have an account?
            <a href="login.html" style="color: #FF6B35; font-weight: 600; text-decoration: none;">Login</a>
        </div>
    </form>
</div>

<script type="module" src="signup.js"></script>
</body>
</html>
