<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrievanceHub | Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Poppins',sans-serif;
    background: linear-gradient(135deg,#FF6B35 0%,#F7931E 100%);
}
.login-card{
    width:100%;
    max-width:420px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
}
.brand-title{
    font-weight:700;
    text-align:center;
    margin-bottom:30px;
    color:#FF6B35;
}
.btn-main{
    background:linear-gradient(135deg,#FF6B35 0%,#F7931E 100%);
    border:none;
    color:white;
    font-weight:600;
}
.btn-main:hover{
    opacity:0.9;
}
.btn-google{
    background:white;
    border:1px solid #ddd;
}
.admin-toggle{
    font-size:14px;
    cursor:pointer;
    color:#FF6B35;
}
</style>
</head>
<body>

<div class="login-card">
    <h3 class="brand-title">GrievanceHub Login</h3>

    <form id="loginForm">
        <div class="mb-3">
            <label>Email</label>
            <input id="email" type="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input id="password" type="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-main w-100 mb-2">
            Login
        </button>

        <button type="button" id="googleLogin" class="btn btn-google w-100 mb-3">
            Sign in with Google
        </button>

        <div class="text-center">
            <span class="admin-toggle" id="toggleAdmin">
                Login as Admin
            </span>
        </div>

        <div class="text-center mt-3">
            Don’t have an account?
            <a href="signup.html">Register</a>
        </div>
    </form>
</div>

<script type="module" src="login.js"></script>
</body>
</html>
