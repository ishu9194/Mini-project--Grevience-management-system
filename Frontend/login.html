<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrievanceHub | Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="app.css" rel="stylesheet">


</head>
<body class="auth-page">

<div class="auth-shell">
    <div class="auth-card p-4 p-md-5">
        <h3 class="brand-title auth-brand text-center mb-4" style="color:#FF6B35;">GrievanceHub Login</h3>

    <form id="loginForm">
        <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input id="email" type="email" class="form-control form-control-lg" required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <input id="password" type="password" class="form-control form-control-lg" required>
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-2 fw-bold">
            Login
        </button>

        <button type="button" id="googleLogin" class="btn btn-outline-secondary w-100 mb-3 fw-semibold">
            <i class="fab fa-google me-2"></i>Sign in with Google
        </button>

        <div class="text-center">
            <button class="btn btn-link p-0 fw-semibold" type="button" id="toggleAdmin" style="color:#FF6B35; text-decoration:none;">
                Login as Admin
            </button>
        </div>

        <div class="text-center mt-3">
            Don't have an account?
            <a class="fw-semibold" href="signup.html" style="color:#FF6B35; text-decoration:none;">Register</a>
        </div>
    </form>
</div>
</div>

<script type="module" src="login.js"></script>
</body>
</html>
